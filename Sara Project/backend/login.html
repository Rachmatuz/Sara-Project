<!DOCTYPE html>
<html>
<head>
    <title>Login HR</title>

    <style>

    body{
        font-family: Arial;
        background:#f5f5f5;
    }

    .card{
        width:350px;
        margin:100px auto;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,.1);
    }

    input{
        width:100%;
        padding:10px;
        margin:10px 0;
    }

    button{
        width:100%;
        padding:10px;
        background:#d85c6a;
        color:white;
        border:none;
        cursor:pointer;
    }

    </style>

</head>

<body>

<div class="card">

<h2>Login HR</h2>

<form method="POST">

<input type="text"
       name="username"
       placeholder="Username"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<button type="submit">
Masuk
</button>

</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
